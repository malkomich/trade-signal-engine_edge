name: Deploy Edge

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    permissions:
      contents: read
    concurrency:
      group: deploy-edge-${{ github.ref }}
      cancel-in-progress: false
    runs-on: [self-hosted, raspberry, trade-signal-engine-edge]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Deploy on Raspberry Pi
        working-directory: services/edge
        env:
          EDGE_PROVIDER: synthetic
          EDGE_HTTP_PORT: 8081
          EDGE_PORT: 18081
          API_BASE_URL: http://api:8080
          EDGE_DEPLOYMENT_PROFILE: pi
          EDGE_LOG_LEVEL: INFO
          EDGE_METRICS_ENABLED: "false"
          EDGE_SECRET_SOURCE: environment
        run: |
          set -e
          docker compose up -d --build --remove-orphans
          docker compose ps
