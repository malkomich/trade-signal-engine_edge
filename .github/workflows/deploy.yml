name: Deploy Edge

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    permissions:
      contents: read
    concurrency:
      group: deploy-edge-${{ github.ref }}
      cancel-in-progress: false
    runs-on: [self-hosted, raspberry, trade-signal-engine-edge]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Verify runner prerequisites
        run: |
          set -e
          docker --version
          docker compose version

      - name: Deploy on Raspberry Pi
        env:
          EDGE_PROVIDER: synthetic
          EDGE_HTTP_PORT: 8081
          EDGE_PORT: 18081
          API_BASE_URL: http://api:8080
          EDGE_DEPLOYMENT_PROFILE: pi
          EDGE_LOG_LEVEL: INFO
          EDGE_METRICS_ENABLED: "false"
          EDGE_SECRET_SOURCE: environment
        run: |
          set -e
          docker compose up -d --build --remove-orphans
          python - <<'PY'
          import os
          import sys
          import time
          from urllib.request import urlopen

          port = os.getenv("EDGE_PORT", "18081")
          url = f"http://127.0.0.1:{port}/readyz"
          deadline = time.time() + 60

          while time.time() < deadline:
              try:
                  with urlopen(url, timeout=2) as response:
                      if response.status == 200:
                          sys.exit(0)
              except Exception:
                  time.sleep(2)

          print("edge ready endpoint did not become ready", file=sys.stderr)
          sys.exit(1)
          PY
          docker compose ps
