name: Deploy Edge

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    permissions:
      contents: read
    concurrency:
      group: deploy-edge-${{ github.ref }}
      cancel-in-progress: false
    runs-on: [self-hosted, raspberry, trade-signal-engine-edge]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Verify runner prerequisites
        run: |
          set -e
          docker --version
          docker compose version

      - name: Prepare Alpaca credentials
        env:
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
        run: |
          set -e
          install_dir="$HOME/.trade-signal-engine-edge"
          mkdir -p "$install_dir"
          key_id_file="$install_dir/alpaca-api-key-id"
          secret_file="$install_dir/alpaca-api-secret-key"

          if [ -z "$ALPACA_API_KEY_ID" ] || [ -z "$ALPACA_API_SECRET_KEY" ]; then
            echo "missing Alpaca credentials" >&2
            exit 1
          fi

          printf '%s' "$ALPACA_API_KEY_ID" > "$key_id_file"
          printf '%s' "$ALPACA_API_SECRET_KEY" > "$secret_file"
          chmod 600 "$key_id_file" "$secret_file"
          {
            echo "ALPACA_API_KEY_ID_FILE=$key_id_file"
            echo "ALPACA_API_SECRET_KEY_FILE=$secret_file"
          } >> "$GITHUB_ENV"

      - name: Remove legacy containers
        run: |
          set -e
          for container in \
            trade-signal-engine-server-edge \
            trade-signal-engine-server-edge-1 \
            trading-signal-engine-server-edge \
            trading-signal-engine-server-edge-1
          do
            docker rm -f "$container" 2>/dev/null || true
          done

      - name: Deploy on Raspberry Pi
        env:
          EDGE_SYMBOLS: TSLA,NVDA,META
          EDGE_BENCHMARK_SYMBOL: QQQ
          EDGE_SESSION_ID: nasdaq-live
          EDGE_PROVIDER: alpaca
          EDGE_BARS: 240
          EDGE_HTTP_PORT: 8081
          EDGE_PORT: 18181
          API_BASE_URL: http://api:8080
          EDGE_DEPLOYMENT_PROFILE: pi
          EDGE_LOG_LEVEL: INFO
          EDGE_METRICS_ENABLED: "false"
          EDGE_SECRET_SOURCE: environment
          ALPACA_DATA_FEED: iex
        run: |
          set -e
          docker compose up -d --build
          python - <<'PY'
          import os
          import sys
          import time
          from urllib.request import urlopen

          port = os.getenv("EDGE_PORT", "18181")
          url = f"http://127.0.0.1:{port}/readyz"
          deadline = time.time() + 60

          while time.time() < deadline:
              try:
                  with urlopen(url, timeout=2) as response:
                      if response.status == 200:
                          sys.exit(0)
              except Exception:
                  time.sleep(2)

          print("edge ready endpoint did not become ready", file=sys.stderr)
          sys.exit(1)
          PY
          docker compose ps
